<body class="">
<admin-navbar></admin-navbar>
<div class="admin-wrapper">
    <div id="admin-sidebar-backdrop" class="admin-sidebar-backdrop"></div>
    <admin-sidebar></admin-sidebar>
    <main class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Dashboard Administrativo</h4>
            <span class="text-muted small" id="current-date"></span>
        </div>
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card admin-stat-card shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="admin-stat-icon bg-primary bg-opacity-10 text-primary">
                            <i class="bi bi-mortarboard"></i>
                        </div>
                        <div>
                            <div class="fs-3 fw-bold" id="stat-estudiantes">-</div>
                            <div class="text-muted small">Estudiantes</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card admin-stat-card shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="admin-stat-icon bg-success bg-opacity-10 text-success">
                            <i class="bi bi-person-badge"></i>
                        </div>
                        <div>
                            <div class="fs-3 fw-bold" id="stat-docentes">-</div>
                            <div class="text-muted small">Docentes</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card admin-stat-card shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="admin-stat-icon bg-warning bg-opacity-10 text-warning">
                            <i class="bi bi-book"></i>
                        </div>
                        <div>
                            <div class="fs-3 fw-bold" id="stat-materias">-</div>
                            <div class="text-muted small">Unidades Curriculares</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card admin-stat-card shadow-sm">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="admin-stat-icon bg-info bg-opacity-10 text-info">
                            <i class="bi bi-people"></i>
                        </div>
                        <div>
                            <div class="fs-3 fw-bold" id="stat-secciones">-</div>
                            <div class="text-muted small">Secciones</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-3">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white py-3 fw-bold">
                        <i class="bi bi-calendar3 me-1"></i> Calendario Académico
                    </div>
                    <div class="card-body p-3">
                        <div id="cev-calendar-container"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white py-3 fw-bold">
                        <i class="bi bi-clock-history me-1"></i> Actividad Reciente
                    </div>
                    <div class="card-body p-3">
                        <div class="text-center py-4 text-muted">
                            <i class="bi bi-inbox" style="font-size: 2.5rem;"></i>
                            <p class="mt-2 mb-0 small">No hay actividad reciente.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
