<body class="">
<admin-navbar></admin-navbar>
<div class="admin-wrapper">
    <div id="admin-sidebar-backdrop" class="admin-sidebar-backdrop"></div>
    <admin-sidebar></admin-sidebar>
    <main class="admin-content">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3 d-flex flex-wrap justify-content-between align-items-center gap-2">
                <h5 class="fw-bold mb-0"><i class="bi bi-people me-2"></i>Usuarios</h5>
                <a href="/a/crear-usuarios" class="btn btn-primary btn-sm fw-bold">
                    <i class="bi bi-plus-lg me-1"></i> Crear usuario
                </a>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                            <input type="text" id="buscar-usuario" class="form-control" placeholder="Buscar usuarios...">
                        </div>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Correo</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-usuarios">
                            <tr>
                                <td colspan="7" class="text-center text-muted py-4">
                                    <i class="bi bi-hourglass-split me-1"></i> Cargando usuarios...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
