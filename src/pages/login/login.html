<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEV Informática | Login</title>

  <link rel="shortcut icon" href="/assets/img/cev.png" type="image/x-icon">

  <link rel="stylesheet" href="/assets/plugins/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/plugins/bootstrap-icons/bootstrap-icons.css">
  <link rel="stylesheet" href="/assets/plugins/cev-calendar/cev-calendar.css">
  <link rel="stylesheet" href="/assets/css/cev-swal.css">

  <script src="/assets/plugins/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="/assets/plugins/sweetalert2/sweetalert.js"></script>

  <script type="module" src="/src/components/index.js"></script>
  <script type="module" src="/assets/plugins/cev-calendar/cev-calendar.js"></script>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

          <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
            <div class="bg-primary" style="height: 5px;"></div>

            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <div class="mb-3">
                  <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                </div>
                <h3 class="fw-bold text-dark">¡Bienvenido de nuevo!</h3>
                <p class="text-muted small">Ingresa tus credenciales institucionales para acceder al Control de Estudios
                  Virtual.</p>
              </div>

              <form id="form-login" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label text-secondary small fw-bold">Correo Electrónico</label>
                  <div class="input-group">
                    <span class="input-group-text bg-white text-muted border-end-0"><i
                        class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control bg-white border-start-0 ps-0" id="email" name="email"
                      placeholder="ejemplo@correo.com" required>
                    <div class="invalid-feedback" id="emailError"></div>
                  </div>
                </div>

                <div class="mb-4">
                  <label for="password" class="form-label text-secondary small fw-bold">Contraseña</label>
                  <div class="input-group">
                    <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control bg-white border-start-0 ps-0" id="password"
                      name="password" placeholder="••••••••" required>
                    <div class="invalid-feedback" id="passwordError"></div>
                  </div>
                </div>

                <div class="d-grid gap-2">
                  <button type="submit" id="btn-login" class="btn btn-primary btn-lg fw-bold py-2 shadow-sm fs-6">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Sistema
                  </button>
                  <a href="/" class="btn btn-link btn-sm text-muted text-decoration-none mt-2">
                    <i class="bi bi-arrow-left me-1"></i> Volver al inicio
                  </a>
                </div>
              </form>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <app-footer></app-footer>

</body>

</html>
